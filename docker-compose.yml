version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai_teacher_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_teacher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_teacher_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai_teacher_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_teacher_network

  # ChromaDB Vector Store
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: ai_teacher_chromadb
    ports:
      - "8000:8000"
    environment:
      CHROMA_PERSISTENCE_TYPE: file
      CHROMA_PERSISTENCE_DIR: /data
    volumes:
      - chromadb_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_teacher_network

  # Ollama LLM Service (Optional - comment out if not available locally)
  # Note: Ensure ollama is running on the host separately
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ai_teacher_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - ai_teacher_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_teacher_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_teacher
      REDIS_URL: redis://redis:6379/0
      VECTOR_STORE_TYPE: chromadb
      VECTOR_STORE_HOST: chromadb
      VECTOR_STORE_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434  # Change to http://host.docker.internal:11434 if ollama is on host
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ai_teacher_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_teacher_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ai_teacher_network

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  # ollama_data:

networks:
  ai_teacher_network:
    driver: bridge
